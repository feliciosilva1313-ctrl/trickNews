    <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="../css/compra.css">
    <a href="../html/loja.html" class="btn-voltar">← Voltar</a>
</head>
<body>

<div class="container">
    <h1>Carrinho de Compras</h1>

    <div class="carrinho">
        <!-- Lista de produtos -->
        <div class="produtos">

            <div class="cabecalho">
                <span>PRODUTO</span>
                <span>QUANTIDADE</span>
                <span>PREÇO</span>
                <span>SUBTOTAL</span>
            </div>

            <div class="item">
                <div class="produto-info">
                    <img src="../imgs/loja/streetpro.png" alt="Produto">
                    <p>Shape Maple CBGANG Pro Model Gui Alves
                    </p>
                </div>

                <div class="quantidade">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                </div>

                <div class="preco">R$184,90</div>
                <div class="subtotal">R$184,90</div>

                <div class="remover">🗑️</div>
            </div>

        </div>

        <!-- Resumo -->
        <div class="resumo">
            <p class="frete">Frete grátis <span>a partir de R$499,90</span></p>

            <div class="linha">
                <span>Subtotal:</span>
                <span>R$184,90</span>
            </div>

            <div class="linha total">
                <span>Total:</span>
                <span>R$184,90</span>
            </div>

            <p class="pix">Ou R$179,35 com Pix</p>

            <button class="btn">INICIAR COMPRA</button>
        </div>
    </div>
</div>
</body>
</html>
